name: infra.samples.watchos

on:
  workflow_dispatch:
  pull_request:
    paths:
    # Sources
    - 'FirebaseABTesting/**'
    - 'FirebaseDatabase/**'
    - 'FirebaseRemoteConfig/**'
    - 'FirebaseStorage/**'
    # Sample
    - 'Example/watchOSSample/**'
    # Firebase Podspec
    - 'Firebase.podspec'
    # This file
    - '.github/workflows/infra.samples.watchos.yml'
    # Rebuild on Ruby infrastructure changes
    - 'Gemfile*'
  schedule:
    # Run every day at 11pm (PDT) / 2am (EDT) - cron uses UTC times
    - cron:  '0 6 * * *'

concurrency:
    group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
    cancel-in-progress: true

jobs:
  watchos-sample-build-test:
    # Don't run on private repo unless it is a PR.
    if: (github.repository == 'Firebase/firebase-ios-sdk' && github.event_name == 'schedule') || github.event_name == 'pull_request'
    uses: ./.github/workflows/_build.yml
    with:
      product: WatchOSSample
      platform: watchOS
      method: xcodebuild
      setup_command: |
        scripts/setup_bundler.sh
        scripts/install_prereqs.sh WatchOSSample watchOS
    # Note: The original job had a condition `([ -z "$plist_secret" ] || scripts/build.sh WatchOSSample watchOS)`. The _build.yml workflow's `check_secrets` job already handles the logic of skipping on forks if secrets are present, so no explicit plist_secret is needed here in the `with` section unless used in the setup_command.
